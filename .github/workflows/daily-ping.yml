# Simulated daily request to your render project so that the service does not go down
name: Daily render ping

on:
  schedule:
    - cron: '0 23 * * *' # Runs daily at midnight UTC
    workflow_dispatch: # Allows manual triggering

  jobs:
    curl-website:
      runs-on: ubuntu-latest

      steps:
        - name: Run curl on website
          run: curl -I https://elevana-backend.onrender.com
