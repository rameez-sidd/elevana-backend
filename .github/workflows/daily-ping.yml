name: Daily render ping

on:
  schedule:
    - cron: '0 23 * * *'  # Runs daily at 11 PM UTC (adjust as needed)
  workflow_dispatch:       # Allows manual triggering

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: curl -I https://elevana-backend.onrender.com
